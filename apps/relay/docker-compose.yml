services:
  relay:
    build: .
    container_name: pixora-relay
    restart: unless-stopped
    ports:
      - "25:25"
      - "3001:3001"
    env_file:
      - .env
    volumes:
      # Mount Let's Encrypt certificates (created by certbot on host)
      - /etc/letsencrypt/live/relay.simtech.one/privkey.pem:/certs/privkey.pem:ro
      - /etc/letsencrypt/live/relay.simtech.one/fullchain.pem:/certs/fullchain.pem:ro
    environment:
      - NODE_ENV=production
      - TLS_KEY_PATH=/certs/privkey.pem
      - TLS_CERT_PATH=/certs/fullchain.pem
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
